name: Destroy stack (teardown)

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: Nome da stack CloudFormation (deve bater com o deploy)
        required: true
        default: filazero-mvp
        type: string
      aws_region:
        description: Regiao AWS
        required: true
        default: us-east-1
        type: string
      confirm_destroy:
        description: Digite exatamente DESTROY para confirmar
        required: true
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'DESTROY'

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: SAM delete (stack e artefatos SAM quando aplicavel)
        run: |
          sam delete \
            --stack-name "${{ github.event.inputs.stack_name }}" \
            --region "${{ github.event.inputs.aws_region }}" \
            --no-prompts

  blocked:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy != 'DESTROY'

    steps:
      - name: Recusado — confirmacao incorreta
        run: |
          echo "::error::Para executar o teardown, rode de novo e informe confirm_destroy = DESTROY (maiusculas)."
          exit 1
